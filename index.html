<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkers</title>
    <link rel="stylesheet" href="styles/reset.css">
    <link rel="stylesheet" href="styles/style.css">
    <script src="src/main.ts" type="module" defer></script>
</head>
<body>
    <div class="game-container">
        <header class="header">
            <h1 class="title">CHECKERS</h1>
            <div class="turn-indicator">
                <div class="timer-container">
                    <span id="timer-player-1" class="timer-text">01:00</span>
                    <span class="turn-dot" id="turn-dot"></span>
                    <span id="turn-text">Player 1's Turn</span>
                    <span id="timer-player-2" class="timer-text">01:00</span>
                </div>
            </div>
        </header>
        
        <div class="main-content">
            <main>
                <div id="board"></div>
            </main>

            <aside class="history-panel">
                <h2 class="history-title">Move History</h2>
                <div class="history-list-container">
                    <ul id="history-list"></ul>
                </div>
            </aside>
        </div>
        
        <footer class="footer">
            <button id="undo-btn" class="btn btn-primary" disabled>↶ Undo</button>
        </footer>
    </div>

    <div class="modal-overlay" id="win-modal">
        <div class="modal">
            <h2>Game Over!</h2>
            <p class="winner-text" id="winner-text">Player 1 Wins!</p>
            <button id="play-again-btn" class="btn btn-primary">Play Again</button>
        </div>
    </div>
</body>
</html>
